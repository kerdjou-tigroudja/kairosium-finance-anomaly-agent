# Cloud Build — tests pytest (Constitution §7.4 / ADR-005).
# Configurer un trigger sur ce repo avec le répertoire de build = racine du dossier
# kairosium-finance-anomaly-agent (ou ajuster `dir` ci-dessous en monorepo).
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: tests
    name: python:3.12-slim
    dir: .
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates
        curl -LsSf https://astral.sh/uv/install.sh | sh
        export PATH="$$HOME/.local/bin:$$PATH"
        uv sync --extra dev
        uv run pytest tests/test_agent.py::test_accuracy_golden_set -v
